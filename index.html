<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>タイピング速度ゲーム</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Segoe UI', 'Hiragino Sans', sans-serif;
    background: #0f0f1a;
    color: #e0e0e0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px 20px;
    gap: 0;
  }

  /* ── Header ── */
  .game-header {
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 16px;
  }
  .game-header img {
    max-width: 640px;
    width: 100%;
    height: auto;
  }

  /* ── Difficulty ── */
  .difficulty-bar {
    display: flex;
    gap: 8px;
    margin-bottom: 20px;
  }
  .diff-btn {
    padding: 5px 18px;
    border-radius: 20px;
    border: 2px solid #2a2a40;
    background: transparent;
    color: #888;
    cursor: pointer;
    font-size: 0.82rem;
    transition: all .2s;
  }
  .diff-btn.active, .diff-btn:hover {
    border-color: #7c6af7;
    color: #7c6af7;
    background: #7c6af718;
  }

  /* ── Problem card ── */
  .problem-card {
    background: #16162a;
    border: 1px solid #2a2a40;
    border-radius: 14px;
    padding: 22px 28px 18px;
    width: 720px;
    max-width: 100%;
    margin-bottom: 12px;
    position: relative;
  }

  .proverb-display {
    font-size: 1.6rem;
    letter-spacing: 0.1em;
    color: #d0d0f0;
    margin-bottom: 12px;
    min-height: 2.2rem;
    padding-bottom: 12px;
    border-bottom: 1px solid #222238;
  }

  .typing-line {
    font-size: 1.2rem;
    line-height: 2.2;
    letter-spacing: 0.06em;
    min-height: 60px;
    word-break: break-all;
    margin-bottom: 6px;
  }

  .char.correct { color: #69f0ae; }
  .char.wrong   { color: #ff5252; background: #ff525218; border-radius: 2px; }
  .char.pending { color: #888; }
  .char.cursor::after {
    content: '';
    display: inline-block;
    width: 2px;
    height: 1.1em;
    background: #7c6af7;
    margin-left: 1px;
    vertical-align: text-bottom;
    animation: blink .7s step-end infinite;
  }
  .char.wrong.cursor::after { background: #ff5252; }

  @keyframes blink { 50% { opacity: 0; } }
  @keyframes shake {
    0%,100% { transform: translateX(0); }
    25%      { transform: translateX(-4px); }
    75%      { transform: translateX(4px); }
  }
  .char.shake { animation: shake .15s ease; }

  .romaji-hint {
    font-size: 0.82rem;
    color: #9090c0;
    letter-spacing: 0.06em;
    min-height: 1rem;
  }

  /* スタートヒント — カード内オーバーレイ */
  .start-overlay {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    border-radius: 14px;
    background: #16162af0;
    gap: 10px;
  }
  .start-overlay.hidden { display: none; }
  .start-key {
    font-size: 1rem;
    color: #9090c0;
    letter-spacing: 0.08em;
  }
  .start-key kbd {
    display: inline-block;
    padding: 4px 12px;
    border: 1px solid #7c6af7;
    border-radius: 6px;
    color: #7c6af7;
    font-size: 0.9rem;
    margin: 0 4px;
  }

  /* カウントダウンオーバーレイ */
  .countdown-overlay {
    position: absolute;
    inset: 0;
    background: #0f0f1acc;
    border-radius: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .countdown-number {
    font-size: 5rem;
    font-weight: bold;
    background: linear-gradient(135deg, #7c6af7, #4fc3f7);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    animation: pop .4s ease;
  }
  @keyframes pop {
    0%   { transform: scale(1.6); opacity: 0; }
    100% { transform: scale(1);   opacity: 1; }
  }

  /* ── Stats bar (カード下) ── */
  .stats-bar {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0;
    width: 720px;
    max-width: 100%;
    background: #13132240;
    border: 1px solid #1e1e32;
    border-radius: 10px;
    margin-bottom: 10px;
    overflow: hidden;
  }
  .stat-cell {
    flex: 1;
    text-align: center;
    padding: 10px 0;
    border-right: 1px solid #1e1e32;
  }
  .stat-cell:last-child { border-right: none; }
  .stat-value { font-size: 1.6rem; font-weight: bold; color: #4fc3f7; line-height: 1; }
  .stat-label { color: #888; font-size: 0.72rem; margin-top: 3px; }

  /* タイマーセル */
  .timer-cell {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 8px 0;
    border-right: 1px solid #1e1e32;
    position: relative;
  }
  .timer-ring-wrap { position: relative; width: 54px; height: 54px; }
  .timer-ring-wrap svg { transform: rotate(-90deg); }
  .ring-bg { fill: none; stroke: #1e1e32; stroke-width: 5; }
  .ring-fg { fill: none; stroke: #7c6af7; stroke-width: 5; stroke-linecap: round; transition: stroke-dashoffset .4s linear, stroke .3s; }
  .timer-text { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); font-size: 1rem; font-weight: bold; color: #e0e0e0; }
  .timer-label { color: #888; font-size: 0.72rem; margin-top: 2px; }

  /* ── Romaji buffer ── */
  .romaji-buffer {
    font-size: 0.85rem;
    color: #444;
    letter-spacing: 0.12em;
    text-align: center;
    height: 22px;
    margin-bottom: 10px;
    transition: color .2s;
  }
  .romaji-buffer.active { color: #7c6af7; }

  /* ── Bottom row ── */
  .bottom-row {
    display: flex;
    align-items: center;
    gap: 20px;
  }
  .highscore-row { font-size: 0.82rem; color: #888; }
  .highscore-row span { color: #f9a825; font-weight: bold; }

  /* 音量スライダー */
  .volume-ctrl {
    display: flex;
    align-items: center;
    gap: 7px;
    font-size: 0.82rem;
    color: #666;
  }
  .volume-ctrl input[type=range] {
    -webkit-appearance: none;
    width: 90px;
    height: 4px;
    background: #2a2a40;
    border-radius: 2px;
    outline: none;
    cursor: pointer;
  }
  .volume-ctrl input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 14px;
    height: 14px;
    border-radius: 50%;
    background: #7c6af7;
    cursor: pointer;
    transition: background .2s;
  }
  .volume-ctrl input[type=range]::-webkit-slider-thumb:hover { background: #4fc3f7; }

  .btn {
    padding: 8px 28px;
    border-radius: 8px;
    border: none;
    background: linear-gradient(135deg, #7c6af7, #4fc3f7);
    color: #fff;
    font-size: 0.9rem;
    cursor: pointer;
    font-weight: bold;
    transition: opacity .2s, transform .1s;
  }
  .btn:hover { opacity: .85; }
  .btn:active { transform: scale(.97); }
  .btn:focus-visible { outline: 2px solid #7c6af7; outline-offset: 3px; }

  /* ── Result screen ── */
  /* モーダル背景 */
  #result-backdrop {
    display: none;
    position: fixed;
    inset: 0;
    background: #0a0a1480;
    backdrop-filter: blur(4px);
    -webkit-backdrop-filter: blur(4px);
    z-index: 100;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  #result-backdrop.show { display: flex; animation: backdropIn .3s ease both; }
  @keyframes backdropIn { from { opacity: 0; } to { opacity: 1; } }

  #result-screen {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
    background: #16162a;
    border: 1px solid #2a2a40;
    border-radius: 16px;
    padding: 28px 40px;
    width: 680px;
    max-width: 100%;
    position: relative;
    animation: resultIn .35s cubic-bezier(.2,.8,.4,1) both;
  }
  @keyframes resultIn {
    from { opacity: 0; transform: translateY(16px) scale(.97); }
    to   { opacity: 1; transform: translateY(0)    scale(1); }
  }

  .result-title { font-size: 1.4rem; font-weight: bold; color: #7c6af7; }
  .new-record {
    font-size: 1rem; color: #f9a825; vertical-align: middle;
    animation: recordPop .5s cubic-bezier(.2,1.4,.4,1) both;
  }
  @keyframes recordPop {
    from { transform: scale(0) rotate(-10deg); opacity: 0; }
    to   { transform: scale(1) rotate(0deg);   opacity: 1; }
  }

  .result-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px 40px;
    width: 100%;
  }
  .result-item { text-align: center; }
  .result-value {
    font-size: 2rem; font-weight: bold; color: #4fc3f7;
    transition: color .3s;
  }
  .result-label { color: #888; font-size: 0.78rem; margin-top: 2px; }

  .feedback-box {
    width: 100%;
    display: flex;
    align-items: flex-start;
    gap: 14px;
    opacity: 0;
    transition: opacity .5s ease;
  }
  .feedback-box.visible { opacity: 1; }

  /* 塾長アバター */
  .jukucho-col {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    flex-shrink: 0;
  }
  .jukucho-avatar {
    width: 114px;
    height: 114px;
    border-radius: 50%;
    object-fit: cover;
    border: 2px solid #7c6af7;
    box-shadow: 0 0 10px #7c6af740;
  }
  .feedback-name {
    font-size: 0.65rem;
    color: #666;
    text-align: center;
    line-height: 1.3;
    white-space: nowrap;
  }

  /* 吹き出し */
  .feedback-bubble {
    position: relative;
    background: #0f0f1a;
    border: 1px solid #2a2a40;
    border-radius: 12px;
    padding: 12px 16px;
    flex: 1;
  }
  /* 左向きの三角（アバター側） */
  .feedback-bubble::before {
    content: '';
    position: absolute;
    left: -9px;
    top: 24px;
    border-top: 8px solid transparent;
    border-bottom: 8px solid transparent;
    border-right: 9px solid #2a2a40;
  }
  .feedback-bubble::after {
    content: '';
    position: absolute;
    left: -7px;
    top: 25px;
    border-top: 7px solid transparent;
    border-bottom: 7px solid transparent;
    border-right: 8px solid #0f0f1a;
  }
  .feedback-label {
    font-size: 0.68rem;
    color: #555;
    letter-spacing: 0.08em;
    margin-bottom: 6px;
  }
  .feedback-main    { font-size: 0.9rem; color: #c8c8e8; line-height: 1.75; }
  .feedback-proverb { font-size: 0.82rem; color: #7c6af7; margin-top: 6px; line-height: 1.7; font-style: italic; }

  /* ── Trend chart ── */
  .trend-chart-wrap {
    width: 100%;
    border-top: 1px solid #222238;
    padding-top: 12px;
  }
  .trend-title {
    font-size: 0.75rem;
    color: #666;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 6px;
    text-align: center;
  }
  .trend-legend {
    display: flex;
    justify-content: center;
    gap: 20px;
    margin-bottom: 8px;
    font-size: 0.72rem;
  }
  .legend-item { display: flex; align-items: center; gap: 5px; color: #888; }
  .legend-dot  { width: 10px; height: 3px; border-radius: 2px; }

  /* ── Leaderboard ── */
  .leaderboard {
    width: 100%;
    border-top: 1px solid #222238;
    padding-top: 12px;
  }
  .leaderboard-title {
    font-size: 0.75rem;
    color: #666;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 8px;
    text-align: center;
  }
  .lb-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 5px 8px;
    border-radius: 6px;
    font-size: 0.82rem;
    transition: background .2s;
  }
  .lb-row.current { background: #7c6af718; }
  .lb-rank { width: 20px; text-align: center; color: #555; font-size: 0.75rem; }
  .lb-rank.gold   { color: #f9a825; font-weight: bold; }
  .lb-rank.silver { color: #9e9e9e; font-weight: bold; }
  .lb-rank.bronze { color: #a1714a; font-weight: bold; }
  .lb-wpm  { font-weight: bold; color: #4fc3f7; min-width: 50px; }
  .lb-acc  { color: #69f0ae; min-width: 44px; }
  .lb-date { color: #444; font-size: 0.72rem; margin-left: auto; }
</style>
</head>
<body>

<!-- ── Header ── -->
<div class="game-header">
  <img src="logo.png" alt="魁！打鍵道場">
</div>

<!-- ── Difficulty ── -->
<div class="difficulty-bar">
  <button class="diff-btn" data-diff="easy">かんたん</button>
  <button class="diff-btn active" data-diff="normal">ふつう</button>
  <button class="diff-btn" data-diff="hard">むずかしい</button>
  <button class="diff-btn" data-diff="english">English</button>
</div>

<!-- ── Problem card ── -->
<div class="problem-card">
  <div class="proverb-display" id="proverb-display"></div>
  <div class="typing-line" id="text-display"></div>
  <div class="romaji-hint" id="romaji-hint"></div>

  <!-- スタートヒント -->
  <div id="start-overlay" class="start-overlay">
    <div class="start-key">
      <kbd>Space</kbd> を押してスタート
    </div>
  </div>

  <!-- カウントダウン -->
  <div id="countdown-overlay" class="countdown-overlay" style="display:none">
    <div id="countdown-number" class="countdown-number"></div>
  </div>
</div>

<!-- ── Stats bar ── -->
<div class="stats-bar">
  <div class="stat-cell">
    <div class="stat-value" id="wpm-val">0</div>
    <div class="stat-label" id="wpm-label">文字/分</div>
  </div>
  <div class="timer-cell">
    <div class="timer-ring-wrap">
      <svg width="54" height="54" viewBox="0 0 54 54">
        <circle class="ring-bg" cx="27" cy="27" r="22"/>
        <circle class="ring-fg" id="ring" cx="27" cy="27" r="22"
          stroke-dasharray="138" stroke-dashoffset="0"/>
      </svg>
      <div class="timer-text" id="timer-text">10</div>
    </div>
    <div class="timer-label">秒</div>
  </div>
  <div class="stat-cell">
    <div class="stat-value" id="acc-val">--</div>
    <div class="stat-label">正確さ</div>
  </div>
</div>

<!-- ── Romaji buffer ── -->
<div id="romaji-buffer" class="romaji-buffer"></div>

<!-- ── Bottom row ── -->
<div class="bottom-row">
  <p class="highscore-row">ハイスコア: <span id="hs-display">0</span> WPM</p>
  <div class="volume-ctrl">
    <span id="vol-icon">🔊</span>
    <input type="range" id="volume-slider" min="0" max="1" step="0.05" value="0.5">
  </div>
  <button class="btn" id="reset-btn">リセット</button>
</div>

<!-- ── Result modal ── -->
<div id="result-backdrop">
  <div id="result-screen">
    <div class="result-title">結果 <span id="r-newrecord" class="new-record" style="display:none">🏆 新記録！</span></div>
    <div class="result-grid">
      <div class="result-item"><div class="result-value" id="r-wpm">0</div><div class="result-label" id="r-wpm-label">文字/分</div></div>
      <div class="result-item"><div class="result-value" id="r-acc">0%</div><div class="result-label">正確さ</div></div>
      <div class="result-item"><div class="result-value" id="r-correct">0</div><div class="result-label">正解文字数</div></div>
      <div class="result-item"><div class="result-value" id="r-wrong">0</div><div class="result-label">ミス</div></div>
    </div>
    <div class="feedback-box">
      <div class="jukucho-col">
        <img src="jukucho.png" alt="塾長" class="jukucho-avatar">
      </div>
      <div class="feedback-bubble">
        <div class="feedback-label">塾長からの一言</div>
        <div class="feedback-main" id="r-feedback-main"></div>
        <div class="feedback-proverb" id="r-feedback-proverb"></div>
      </div>
    </div>
    <div class="trend-chart-wrap">
      <div class="trend-title">直近5回の推移</div>
      <div class="trend-legend">
        <span class="legend-item"><span class="legend-dot" style="background:#4fc3f7"></span>WPM</span>
        <span class="legend-item"><span class="legend-dot" style="background:#69f0ae"></span>正確さ (%)</span>
      </div>
      <svg id="trend-svg" width="100%" viewBox="0 0 520 120" xmlns="http://www.w3.org/2000/svg"></svg>
    </div>
    <div class="leaderboard">
      <div class="leaderboard-title">ベスト記録</div>
      <div id="lb-list"></div>
    </div>
    <button class="btn" id="retry-btn">もう一度</button>
  </div>
</div>

<script>
// Romaji to hiragana (longest-match table)
const ROMAJI_MAP = [
  ['kya','きゃ'],['kyu','きゅ'],['kyo','きょ'],
  ['sha','しゃ'],['shi','し'],['shu','しゅ'],['sho','しょ'],
  ['chi','ち'],['cha','ちゃ'],['chu','ちゅ'],['cho','ちょ'],
  ['tsu','つ'],
  ['nya','にゃ'],['nyu','にゅ'],['nyo','にょ'],
  ['hya','ひゃ'],['hyu','ひゅ'],['hyo','ひょ'],
  ['mya','みゃ'],['myu','みゅ'],['myo','みょ'],
  ['rya','りゃ'],['ryu','りゅ'],['ryo','りょ'],
  ['gya','ぎゃ'],['gyu','ぎゅ'],['gyo','ぎょ'],
  ['bya','びゃ'],['byu','びゅ'],['byo','びょ'],
  ['pya','ぴゃ'],['pyu','ぴゅ'],['pyo','ぴょ'],
  ['ja','じゃ'],['ju','じゅ'],['jo','じょ'],
  ['ka','か'],['ki','き'],['ku','く'],['ke','け'],['ko','こ'],
  ['sa','さ'],['si','し'],['su','す'],['se','せ'],['so','そ'],
  ['ta','た'],['ti','ち'],['tu','つ'],['te','て'],['to','と'],
  ['na','な'],['ni','に'],['nu','ぬ'],['ne','ね'],['no','の'],
  ['ha','は'],['hi','ひ'],['fu','ふ'],['hu','ふ'],['he','へ'],['ho','ほ'],
  ['ma','ま'],['mi','み'],['mu','む'],['me','め'],['mo','も'],
  ['ya','や'],['yu','ゆ'],['yo','よ'],
  ['ra','ら'],['ri','り'],['ru','る'],['re','れ'],['ro','ろ'],
  ['wa','わ'],['wo','を'],
  ['ga','が'],['gi','ぎ'],['gu','ぐ'],['ge','げ'],['go','ご'],
  ['za','ざ'],['ji','じ'],['zu','ず'],['ze','ぜ'],['zo','ぞ'],
  ['da','だ'],['di','ぢ'],['du','づ'],['de','で'],['do','ど'],
  ['ba','ば'],['bi','び'],['bu','ぶ'],['be','べ'],['bo','ぼ'],
  ['pa','ぱ'],['pi','ぴ'],['pu','ぷ'],['pe','ぺ'],['po','ぽ'],
  ['nn','ん'],
  ['a','あ'],['i','い'],['u','う'],['e','え'],['o','お'],
];

const CONSONANTS = new Set('bcdfghjklmnpqrstvwxyz');
const NEEDS_VOWEL = new Set('bcdfghjklmpqrstvwxyz');

function matchRomaji(buf) {
  for (const [roma, hira] of ROMAJI_MAP) {
    if (buf.endsWith(roma)) return hira;
  }
  return null;
}

const TEXTS = {
  easy: [
    { display: '花より団子',          typing: 'はなよりだんご',              romaji: 'ha na yo ri da n go' },
    { display: '猫に小判',            typing: 'ねこにこばん',                romaji: 'ne ko ni ko ba n' },
    { display: '七転び八起き',        typing: 'ななころびやおき',            romaji: 'na na ko ro bi ya o ki' },
    { display: '棚からぼた餅',        typing: 'たなからぼたもち',            romaji: 'ta na ka ra bo ta mo chi' },
    { display: '豚に真珠',            typing: 'ぶたにしんじゅ',              romaji: 'bu ta ni shi n ju' },
    { display: '目は口ほどに物を言う', typing: 'めはくちほどにものをいう',   romaji: 'me wa ku chi ho do ni mo no wo i u' },
    { display: '馬の耳に念仏',        typing: 'うまのみみにねんぶつ',        romaji: 'u ma no mi mi ni ne n bu tsu' },
    { display: '蛙の子は蛙',          typing: 'かえるのこはかえる',          romaji: 'ka e ru no ko wa ka e ru' },
    { display: '笑う門には福来る',    typing: 'わらうかどにはふくきたる',    romaji: 'wa ra u ka do ni wa fu ku ki ta ru' },
    { display: '類は友を呼ぶ',        typing: 'るいはともをよぶ',            romaji: 'ru i wa to mo wo yo bu' },
    { display: '好きこそ物の上手なれ', typing: 'すきこそもののじょうずなれ',  romaji: 'su ki ko so mo no no jo u zu na re' },
    { display: '案ずるより産むが易し', typing: 'あんずるよりうむがやすし',   romaji: 'a n zu ru yo ri u mu ga ya su shi' },
    { display: '口は災いの元',          typing: 'くちはわざわいのもと',          romaji: 'ku chi wa wa za wa i no mo to' },

const queues = { easy: [], normal: [], hard: [], english: [] };
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}
function nextEntry() {
  if (queues[difficulty].length === 0) queues[difficulty] = shuffle(TEXTS[difficulty]);
  return queues[difficulty].shift();
}

const CIRCUMFERENCE = 2 * Math.PI * 22;

let charIndex     = 0;

let finished      = false;
let countingDown  = false;

function isJapanese() { return difficulty !== 'english'; }

function renderText() {
  proverbEl.textContent = currentEntry.display;
  romajiHintEl.textContent = currentEntry.romaji ? '▸ ' + currentEntry.romaji : '';
  displayEl.innerHTML = '';
  for (let i = 0; i < text.length; i++) {
    const span = document.createElement('span');
    span.className = 'char pending' + (i === charIndex ? ' cursor' : '');
    span.textContent = text[i];
    displayEl.appendChild(span);
  }
}

function updateRing() {
  const ratio = timeLeft / TIME_LIMIT;
  ringEl.style.strokeDashoffset = CIRCUMFERENCE * (1 - ratio);
  ringEl.style.stroke = ratio > 0.5 ? '#7c6af7' : ratio > 0.25 ? '#f9a825' : '#ff5252';
}

function calcWpm() {
  const elapsed = (TIME_LIMIT - timeLeft) || 1;
  if (isJapanese()) {
    // 日本語：文字/分（ひらがな1文字=1単位）
    return Math.round(correctChars / (elapsed / 60));
  } else {
    // English：標準WPM（5文字=1語）
    return Math.round((correctChars / 5) / (elapsed / 60));
  }
}
function calcAcc() {
  if (totalTyped === 0) return '--';
  return Math.round((correctChars / totalTyped) * 100) + '%';
}
function updateStats() {
  wpmEl.textContent = started ? calcWpm() : 0;
  accEl.textContent = calcAcc();
}

function startTimer() {
  timerInterval = setInterval(() => {
    timeLeft--;
    timerEl.textContent = timeLeft;
    updateRing();
    updateStats();
    if (timeLeft <= 0) { playGong(); endGame(); }
  }, 1000);
}

function getFeedback(wpm, accPct) {
  const thr   = difficulty === 'english' ? [35, 18] : [150, 80];
  const speed = wpm >= thr[0] ? 'high' : wpm >= thr[1] ? 'mid' : 'low';
  const acc   = accPct >= 93 ? 'high' : accPct >= 78 ? 'mid' : 'low';
  return FEEDBACK[`${speed}_${acc}`] || FEEDBACK.low_low;
}

// ── Score storage ──
function getScores(diff) {
  return JSON.parse(localStorage.getItem('scores_' + diff) || '[]');
}
function getTopWpm(diff) {
  const scores = getScores(diff);
  return scores.length ? scores[0].wpm : 0;
}
function saveScore(diff, wpm, acc) {
  const scores = getScores(diff);
  const date = new Date().toLocaleDateString('ja-JP', { month: 'numeric', day: 'numeric' });
  scores.push({ wpm, acc, date });
  scores.sort((a, b) => b.wpm - a.wpm);
  scores.splice(5);
  localStorage.setItem('scores_' + diff, JSON.stringify(scores));
  const isNew = scores[0].wpm === wpm && scores.filter(s => s.wpm === wpm && s.acc === acc).length === 1;
  const rank = scores.findIndex(s => s.wpm === wpm && s.acc === acc) + 1;
  return { isNew, rank };
}
function saveHistory(diff, wpm, acc) {
  const key = 'history_' + diff;
  const hist = JSON.parse(localStorage.getItem(key) || '[]');
  hist.push({ wpm, acc });
  if (hist.length > 5) hist.shift();
  localStorage.setItem(key, JSON.stringify(hist));
  return hist;
}
function renderChart(diff) {
  const key = 'history_' + diff;
  const hist = JSON.parse(localStorage.getItem(key) || '[]');
  const svg = document.getElementById('trend-svg');

  // chart area: x 50..490, y 12..98 (height 86)
  const L = 50, R = 490, T = 12, B = 98, H = B - T, W = R - L;
  const n = hist.length;

  if (n < 2) {
    svg.innerHTML = `<text x="260" y="60" text-anchor="middle" fill="#444" font-size="12">2回以上プレイすると表示されます</text>`;
    return;
  }

  const xs = hist.map((_, i) => L + (i / (n - 1)) * W);
  const maxWpm = Math.max(...hist.map(d => d.wpm), 1);
  // normalize WPM against max*1.15 so top point isn't flush with edge
  const wpmY  = d => B - (d.wpm / (maxWpm * 1.15)) * H;
  const accY  = d => B - (d.acc  / 115) * H;

  const polyline = (pts, color) =>
    `<polyline points="${pts.join(' ')}" fill="none" stroke="${color}" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>`;
  const area = (pts, yBase, color) =>
    `<polygon points="${pts[0].split(',')[0]},${yBase} ${pts.join(' ')} ${pts[pts.length-1].split(',')[0]},${yBase}" fill="${color}" opacity="0.08"/>`;
  const dots = (pts, color) =>
    pts.map(p => { const [x,y] = p.split(','); return `<circle cx="${x}" cy="${y}" r="3.5" fill="${color}" stroke="#16162a" stroke-width="1.5"/>`; }).join('');
  const labels = (hist, fn, color, isWpm) =>
    hist.map((d, i) => {
      const x = xs[i], y = fn(d);
      const val = isWpm ? d.wpm : d.acc + '%';
      const dy = y < T + 18 ? 14 : -6;
      return `<text x="${x}" y="${y + dy}" text-anchor="middle" fill="${color}" font-size="10" opacity="0.9">${val}</text>`;
    }).join('');

  // grid lines (horizontal, faint)
  const gridLines = [0, 25, 50, 75, 100].map(pct => {
    const y = B - (pct / 115) * H;
    return `<line x1="${L}" y1="${y}" x2="${R}" y2="${y}" stroke="#1e1e32" stroke-width="1"/>
      <text x="${L - 6}" y="${y + 4}" text-anchor="end" fill="#333" font-size="9">${pct}</text>`;
  }).join('');

  // x-axis labels
  const xLabels = hist.map((_, i) =>
    `<text x="${xs[i]}" y="${B + 14}" text-anchor="middle" fill="#444" font-size="10">${i + 1}回目</text>`
  ).join('');

  const wpmPts = hist.map((d, i) => `${xs[i]},${wpmY(d)}`);
  const accPts = hist.map((d, i) => `${xs[i]},${accY(d)}`);

  svg.innerHTML = gridLines + xLabels
    + area(accPts,  B, '#69f0ae')
    + area(wpmPts,  B, '#4fc3f7')
    + polyline(wpmPts, '#4fc3f7')
    + polyline(accPts, '#69f0ae')
    + dots(wpmPts, '#4fc3f7')
    + dots(accPts, '#69f0ae')
    + labels(hist, wpmY, '#4fc3f7', true)
    + labels(hist, accY, '#69f0ae', false);
}

function renderLeaderboard(diff, currentWpm) {
  const scores = getScores(diff);
  const list = document.getElementById('lb-list');
  if (!scores.length) { list.innerHTML = '<div style="text-align:center;color:#444;font-size:.8rem;padding:6px">まだ記録がありません</div>'; return; }
  const medals = ['🥇', '🥈', '🥉'];
  list.innerHTML = scores.map((s, i) => {
    const isCurrent = s.wpm === currentWpm;
    const rankCls = i === 0 ? 'gold' : i === 1 ? 'silver' : i === 2 ? 'bronze' : '';
    return `<div class="lb-row${isCurrent ? ' current' : ''}">
      <span class="lb-rank ${rankCls}">${medals[i] || (i + 1)}</span>
      <span class="lb-wpm">${s.wpm} WPM</span>
      <span class="lb-acc">${s.acc}%</span>
      <span class="lb-date">${s.date}</span>
    </div>`;
  }).join('');
}

function countUp(el, target, duration, suffix = '') {
  const start = performance.now();
  const step = (now) => {
    const p = Math.min((now - start) / duration, 1);
    const eased = 1 - Math.pow(1 - p, 3); // ease-out cubic
    el.textContent = Math.round(eased * target) + suffix;
    if (p < 1) requestAnimationFrame(step);
  };
  requestAnimationFrame(step);
}

function endGame() {
  finished = true;
  clearInterval(timerInterval);
  bufferEl.textContent = '';
  bufferEl.classList.remove('active');

  const wpm    = calcWpm();
  const accPct = totalTyped === 0 ? 0 : Math.round((correctChars / totalTyped) * 100);
  const accStr = totalTyped === 0 ? '--' : accPct + '%';

  // ① 結果画面をフェードイン表示
  const feedbackBox = document.querySelector('.feedback-box');
  feedbackBox.classList.remove('visible');
  resultEl.classList.add('show');

  // ② スコアをカウントアップ（350ms）
  countUp(document.getElementById('r-wpm'),     wpm,         350);
  countUp(document.getElementById('r-acc'),     accPct,      350, '%');
  countUp(document.getElementById('r-correct'), correctChars, 350);
  countUp(document.getElementById('r-wrong'),   wrongChars,   350);

  // acc が 0 で totalTyped も 0 なら "--" に上書き
  if (totalTyped === 0) {
    setTimeout(() => { document.getElementById('r-acc').textContent = '--'; }, 360);
  }

  // ③ フィードバックをカウントアップ完了後にフェードイン
  const fb = getFeedback(wpm, accPct);
  document.getElementById('r-feedback-main').textContent    = fb.main;
  document.getElementById('r-feedback-proverb').textContent = fb.proverb;
  setTimeout(() => feedbackBox.classList.add('visible'), 500);

  // スコア保存・ランキング更新
  saveHistory(difficulty, wpm, accPct);
  const { isNew, rank } = saveScore(difficulty, wpm, accPct);
  const newRecordEl = document.getElementById('r-newrecord');
  newRecordEl.style.display = 'none';
  if (isNew) setTimeout(() => { newRecordEl.style.display = 'inline'; }, 400);
  renderChart(difficulty);
  renderLeaderboard(difficulty, wpm);
  hsEl.textContent = getTopWpm(difficulty);
}

// ── Audio ──
let audioCtx = null;
function beep() {
  try {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = audioCtx.createOscillator(), gain = audioCtx.createGain();
    osc.connect(gain); gain.connect(audioCtx.destination);
    osc.type = 'square'; osc.frequency.value = 180;
    gain.gain.setValueAtTime(0.08, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.12);
    osc.start(audioCtx.currentTime); osc.stop(audioCtx.currentTime + 0.12);
  } catch (_) {}
}

// ── 音量管理 ──
let masterVolume = 0.5;
function applyVolume(audio) { audio.volume = masterVolume; return audio; }

// パンチ音（文末からの距離で使い分け）
const punchSounds = {
  s: new Audio('se/punch_s.mp3'),
  m: new Audio('se/punch_m.mp3'),
  l: new Audio('se/punch_l.mp3'),
};
const hajimeSound = new Audio('se/男衆「始めいッ！」.mp3');
const gongSound   = new Audio('se/試合終了のゴング.mp3');

function playPunch(distFromEnd) {
  const key = distFromEnd === 0 ? 'l' : distFromEnd === 1 ? 'm' : 's';
  const snd = punchSounds[key];
  snd.volume = masterVolume;
  snd.currentTime = 0;
  snd.play().catch(() => {});
}
function playHajime() {
  hajimeSound.volume = masterVolume;
  hajimeSound.currentTime = 0;
  hajimeSound.play().catch(() => {});
}
function playGong() {
  gongSound.volume = masterVolume;
  gongSound.currentTime = 0;
  gongSound.play().catch(() => {});
}

// ── Char advance / wrong ──
function advanceChar() {
  const spans = displayEl.querySelectorAll('.char');
  spans[charIndex].classList.remove('pending', 'wrong', 'cursor', 'shake');
  spans[charIndex].classList.add('correct');
  playPunch(text.length - 1 - charIndex);
  totalTyped++; correctChars++;
  charIndex++;
  if (charIndex < text.length) spans[charIndex].classList.add('cursor');
  updateStats();
  if (charIndex >= text.length) {
    currentEntry = nextEntry();
    text = currentEntry.typing;
    charIndex = 0;
    renderText();
  }
}
function wrongInput() {
  totalTyped++; wrongChars++;
  updateStats(); beep();
  const span = displayEl.querySelectorAll('.char')[charIndex];
  span.classList.add('wrong');
  span.classList.remove('shake');
  void span.offsetWidth;
  span.classList.add('shake');
}

// ── Key handlers ──
function handleJapaneseKey(key) {
  if (!/^[a-z ]$/.test(key)) return;
  if (key === ' ') { romajiBuffer = ''; bufferEl.textContent = ''; return; }
  romajiBuffer += key;

  if (romajiBuffer.length >= 2) {
    const a = romajiBuffer[romajiBuffer.length - 2], b = romajiBuffer[romajiBuffer.length - 1];
    if (a === b && NEEDS_VOWEL.has(a)) {
      if (text[charIndex] === 'っ') advanceChar(); else wrongInput();
      romajiBuffer = b;
    }
  }
  if (romajiBuffer.length >= 2) {
    const a = romajiBuffer[romajiBuffer.length - 2], b = romajiBuffer[romajiBuffer.length - 1];
    if (a === 'n' && CONSONANTS.has(b) && b !== 'n' && b !== 'y') {
      if (text[charIndex] === 'ん') advanceChar(); else wrongInput();
      romajiBuffer = b;
    }
  }

  const hira = matchRomaji(romajiBuffer);
  if (hira) {
    let allMatch = true;
    for (let i = 0; i < hira.length; i++) if (text[charIndex + i] !== hira[i]) { allMatch = false; break; }
    if (allMatch) { for (let i = 0; i < hira.length; i++) advanceChar(); }
    else wrongInput();
    romajiBuffer = '';
  }
  if (romajiBuffer.length > 4) romajiBuffer = romajiBuffer.slice(1);
  bufferEl.textContent = romajiBuffer;
}
function handleEnglishKey(key) {
  if (key.length !== 1) return;
  if (key === text[charIndex]) advanceChar(); else wrongInput();
}

// ── Countdown ──
function startCountdown() {
  countingDown = true;
  startOverlayEl.classList.add('hidden');
  countdownOverlay.style.display = 'flex';
  let n = 3;
  const tick = () => {
    countdownNumber.textContent = n;
    countdownNumber.style.animation = 'none';
    void countdownNumber.offsetWidth;
    countdownNumber.style.animation = 'pop .4s ease';
  };
  tick();
  const iv = setInterval(() => {
    n--;
    if (n <= 0) {
      clearInterval(iv);
      countdownOverlay.style.display = 'none';
      countingDown = false;
      started = true;
      playHajime();
      startTimer();
      bufferEl.classList.add('active');
    } else tick();
  }, 1000);
}

document.addEventListener('keydown', (e) => {
  if (finished || countingDown) return;
  if (e.ctrlKey || e.altKey || e.metaKey) return;
  const ignore = ['F1','F2','F3','F4','F5','F6','F7','F8','F9','F10','F11','F12',
    'Tab','Escape','CapsLock','Backspace','Delete','Enter',
    'ArrowUp','ArrowDown','ArrowLeft','ArrowRight','Shift'];
  if (ignore.includes(e.key)) return;
  e.preventDefault();
  if (!started) { if (e.key === ' ') startCountdown(); return; }
  if (isJapanese()) handleJapaneseKey(e.key.toLowerCase());
  else handleEnglishKey(e.key);
});

// ── Reset ──
function reset() {
  clearInterval(timerInterval);
  currentEntry  = nextEntry();
  text          = currentEntry.typing;
  charIndex     = 0;
  started       = false;
  finished      = false;
  countingDown  = false;
  timeLeft      = TIME_LIMIT;
  correctChars  = 0;
  wrongChars    = 0;
  totalTyped    = 0;
  romajiBuffer  = '';

  timerEl.textContent = TIME_LIMIT;
  wpmEl.textContent   = 0;
  accEl.textContent   = '--';
  ringEl.style.strokeDashoffset = 0;
  ringEl.style.stroke = '#7c6af7';
  bufferEl.textContent = '';
  bufferEl.classList.remove('active');
  countdownOverlay.style.display = 'none';
  startOverlayEl.classList.remove('hidden');
  resultEl.classList.remove('show');

  renderText();

  const wpmLabel = isJapanese() ? '文字/分' : 'WPM';
  document.getElementById('wpm-label').textContent    = wpmLabel;
  document.getElementById('r-wpm-label').textContent  = wpmLabel;

  hsEl.textContent = getTopWpm(difficulty);
}

document.querySelectorAll('.diff-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    difficulty = btn.dataset.diff;
    queues[difficulty] = [];
    reset();
  });
});
document.getElementById('reset-btn').addEventListener('click', reset);

const volSlider = document.getElementById('volume-slider');
const volIcon   = document.getElementById('vol-icon');
volSlider.addEventListener('input', () => {
  masterVolume = parseFloat(volSlider.value);
  volIcon.textContent = masterVolume === 0 ? '🔇' : masterVolume < 0.4 ? '🔉' : '🔊';
});
document.getElementById('retry-btn').addEventListener('click', reset);
document.getElementById('result-backdrop').addEventListener('click', (e) => {
  if (e.target === document.getElementById('result-backdrop')) reset();
});

reset();
</script>
