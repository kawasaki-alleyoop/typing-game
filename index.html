<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>タイピング速度ゲーム</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Segoe UI', 'Hiragino Sans', sans-serif;
    background: #0f0f1a;
    color: #e0e0e0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }

  h1 {
    font-size: 2rem;
    margin-bottom: 8px;
    background: linear-gradient(90deg, #7c6af7, #4fc3f7);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    letter-spacing: 2px;
  }

  .subtitle { color: #888; margin-bottom: 30px; font-size: 0.9rem; }

  /* --- difficulty --- */
  .difficulty-bar {
    display: flex;
    gap: 10px;
    margin-bottom: 24px;
  }
  .diff-btn {
    padding: 6px 20px;
    border-radius: 20px;
    border: 2px solid #333;
    background: transparent;
    color: #aaa;
    cursor: pointer;
    font-size: 0.85rem;
    transition: all .2s;
  }
  .diff-btn.active, .diff-btn:hover {
    border-color: #7c6af7;
    color: #7c6af7;
    background: #7c6af720;
  }

  /* --- stats bar --- */
  .stats {
    display: flex;
    gap: 30px;
    margin-bottom: 20px;
    font-size: 0.9rem;
  }
  .stat { text-align: center; }
  .stat-value {
    font-size: 1.8rem;
    font-weight: bold;
    color: #4fc3f7;
    line-height: 1;
  }
  .stat-label { color: #666; font-size: 0.75rem; margin-top: 2px; }

  /* --- timer ring --- */
  .timer-ring-wrap {
    position: relative;
    width: 70px;
    height: 70px;
    margin: 0 auto 20px;
  }
  .timer-ring-wrap svg { transform: rotate(-90deg); }
  .ring-bg { fill: none; stroke: #222; stroke-width: 6; }
  .ring-fg { fill: none; stroke: #7c6af7; stroke-width: 6; stroke-linecap: round; transition: stroke-dashoffset .4s linear, stroke .3s; }
  .timer-text {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    font-size: 1.2rem;
    font-weight: bold;
    color: #e0e0e0;
  }

  /* --- text display --- */
  .text-box {
    background: #16162a;
    border: 1px solid #2a2a40;
    border-radius: 12px;
    padding: 20px 24px;
    width: 700px;
    max-width: 100%;
    font-size: 1.25rem;
    line-height: 2;
    letter-spacing: 0.05em;
    margin-bottom: 16px;
    min-height: 90px;
    word-break: break-all;
    position: relative;
  }

  .char { position: relative; }
  .char.correct { color: #69f0ae; }
  .char.wrong   { color: #ff5252; background: #ff525220; border-radius: 2px; }
  .char.pending { color: #555; }
  .char.cursor::after {
    content: '';
    position: absolute;
    left: 0; top: 2px; bottom: 2px;
    width: 2px;
    background: #7c6af7;
    animation: blink .7s step-end infinite;
  }

  @keyframes blink { 50% { opacity: 0; } }

  /* --- input --- */
  #typing-input {
    width: 700px;
    max-width: 100%;
    padding: 12px 16px;
    background: #16162a;
    border: 2px solid #2a2a40;
    border-radius: 10px;
    color: #e0e0e0;
    font-size: 1rem;
    outline: none;
    transition: border-color .2s;
    margin-bottom: 20px;
  }
  #typing-input:focus { border-color: #7c6af7; }
  #typing-input:disabled { opacity: .4; }

  /* --- buttons --- */
  .btn {
    padding: 10px 32px;
    border-radius: 8px;
    border: none;
    background: linear-gradient(135deg, #7c6af7, #4fc3f7);
    color: #fff;
    font-size: 1rem;
    cursor: pointer;
    font-weight: bold;
    transition: opacity .2s, transform .1s;
  }
  .btn:hover { opacity: .85; }
  .btn:active { transform: scale(.97); }

  /* --- result overlay --- */
  #result-screen {
    display: none;
    flex-direction: column;
    align-items: center;
    gap: 16px;
    background: #16162a;
    border: 1px solid #2a2a40;
    border-radius: 16px;
    padding: 32px 48px;
    width: 700px;
    max-width: 100%;
    margin-top: 10px;
  }
  #result-screen.show { display: flex; }
  .result-title { font-size: 1.5rem; font-weight: bold; color: #7c6af7; }
  .result-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px 40px;
    width: 100%;
  }
  .result-item { text-align: center; }
  .result-value { font-size: 2rem; font-weight: bold; color: #4fc3f7; }
  .result-label { color: #888; font-size: 0.8rem; margin-top: 2px; }

  /* --- highscore --- */
  .highscore-row {
    font-size: 0.85rem;
    color: #888;
    margin-top: -10px;
  }
  .highscore-row span { color: #f9a825; font-weight: bold; }

  #main-area { display: flex; flex-direction: column; align-items: center; }
</style>
</head>
<body>

<h1>⌨ タイピングゲーム</h1>
<p class="subtitle">正確さとスピードを鍛えよう</p>

<div class="difficulty-bar">
  <button class="diff-btn" data-diff="easy">かんたん</button>
  <button class="diff-btn active" data-diff="normal">ふつう</button>
  <button class="diff-btn" data-diff="hard">むずかしい</button>
  <button class="diff-btn" data-diff="english">English</button>
</div>

<div class="stats">
  <div class="stat"><div class="stat-value" id="wpm-val">0</div><div class="stat-label">WPM</div></div>
  <div class="stat">
    <div class="timer-ring-wrap">
      <svg width="70" height="70" viewBox="0 0 70 70">
        <circle class="ring-bg" cx="35" cy="35" r="29"/>
        <circle class="ring-fg" id="ring" cx="35" cy="35" r="29"
          stroke-dasharray="182" stroke-dashoffset="0"/>
      </svg>
      <div class="timer-text" id="timer-text">60</div>
    </div>
    <div class="stat-label">秒</div>
  </div>
  <div class="stat"><div class="stat-value" id="acc-val">—</div><div class="stat-label">正確さ</div></div>
</div>

<div id="main-area">
  <div class="text-box" id="text-display"></div>
  <input id="typing-input" type="text" placeholder="ここに入力してスタート..." autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
  <p class="highscore-row">ハイスコア: <span id="hs-display">0</span> WPM</p>
  <button class="btn" id="reset-btn">リセット</button>

  <div id="result-screen">
    <div class="result-title">結果</div>
    <div class="result-grid">
      <div class="result-item"><div class="result-value" id="r-wpm">0</div><div class="result-label">WPM</div></div>
      <div class="result-item"><div class="result-value" id="r-acc">0%</div><div class="result-label">正確さ</div></div>
      <div class="result-item"><div class="result-value" id="r-correct">0</div><div class="result-label">正解文字数</div></div>
      <div class="result-item"><div class="result-value" id="r-wrong">0</div><div class="result-label">ミス</div></div>
    </div>
    <button class="btn" id="retry-btn">もう一度</button>
  </div>
</div>

<script>
const TEXTS = {
  easy: [
    "あいうえお かきくけこ さしすせそ たちつてと なにぬねの",
    "はひふへほ まみむめも やゆよ らりるれろ わをん",
    "いぬ ねこ うさぎ とり さかな きつね くま たぬき",
    "あかい りんご あおい そら しろい くも きいろい ひまわり",
  ],
  normal: [
    "すもも も もも も もも の うち すもも も もも も もも の うち",
    "となりの たかし に たける たこ やき たべろ と たのんだ",
    "なまむぎ なまごめ なまたまご を みっつ ずつ ください",
    "ちょっと まって いま いそいで います あとで れんらく します",
    "きょうは いい てんき ですね こうえんで さんぽ しましょう",
  ],
  hard: [
    "東京特許許可局が許可しなかった特許を再審査することになった",
    "この竹垣に竹立て掛けたのは竹立て掛けたかったから竹立て掛けた",
    "赤巻紙青巻紙黄巻紙を三枚ずつ丁寧に巻き直してください",
    "隣の客はよく柿食う客だが今日はまだ柿を食っていないらしい",
    "生麦生米生卵を三つずつ茹でてから冷水に入れてください",
  ],
  english: [
    "The quick brown fox jumps over the lazy dog near the river bank",
    "Pack my box with five dozen liquor jugs and send it overnight",
    "How vexingly quick daft zebras jump over the old wooden fence",
    "Sphinx of black quartz judge my vow carefully before sunrise",
    "Two driven jocks help fax my big quiz to the world conference",
  ],
};

const TIME_LIMIT = 60;
const CIRCUMFERENCE = 2 * Math.PI * 29;

let difficulty = 'normal';
let text = '';
let charIndex = 0;
let started = false;
let finished = false;
let timerInterval = null;
let timeLeft = TIME_LIMIT;
let correctChars = 0;
let wrongChars = 0;
let totalTyped = 0;

const displayEl = document.getElementById('text-display');
const inputEl   = document.getElementById('typing-input');
const timerEl   = document.getElementById('timer-text');
const ringEl    = document.getElementById('ring');
const wpmEl     = document.getElementById('wpm-val');
const accEl     = document.getElementById('acc-val');
const resultEl  = document.getElementById('result-screen');
const hsEl      = document.getElementById('hs-display');

function pickText() {
  const pool = TEXTS[difficulty];
  return pool[Math.floor(Math.random() * pool.length)];
}

function renderText() {
  displayEl.innerHTML = '';
  for (let i = 0; i < text.length; i++) {
    const span = document.createElement('span');
    span.className = 'char pending' + (i === charIndex ? ' cursor' : '');
    span.textContent = text[i] === ' ' ? ' ' : text[i];
    displayEl.appendChild(span);
  }
}

function updateRing() {
  const ratio = timeLeft / TIME_LIMIT;
  const offset = CIRCUMFERENCE * (1 - ratio);
  ringEl.style.strokeDashoffset = offset;
  ringEl.style.stroke = ratio > 0.5 ? '#7c6af7' : ratio > 0.25 ? '#f9a825' : '#ff5252';
}

function calcWpm() {
  const elapsed = (TIME_LIMIT - timeLeft) || 1;
  return Math.round((correctChars / 5) / (elapsed / 60));
}

function calcAcc() {
  if (totalTyped === 0) return '—';
  return Math.round((correctChars / totalTyped) * 100) + '%';
}

function updateStats() {
  wpmEl.textContent = started ? calcWpm() : 0;
  accEl.textContent = calcAcc();
}

function startTimer() {
  timerInterval = setInterval(() => {
    timeLeft--;
    timerEl.textContent = timeLeft;
    updateRing();
    updateStats();
    if (timeLeft <= 0) endGame();
  }, 1000);
}

function endGame() {
  finished = true;
  clearInterval(timerInterval);
  inputEl.disabled = true;

  const wpm = calcWpm();
  const acc = calcAcc();

  document.getElementById('r-wpm').textContent     = wpm;
  document.getElementById('r-acc').textContent     = acc;
  document.getElementById('r-correct').textContent = correctChars;
  document.getElementById('r-wrong').textContent   = wrongChars;

  resultEl.classList.add('show');

  // highscore
  const key = 'hs_' + difficulty;
  const prev = parseInt(localStorage.getItem(key) || '0');
  if (wpm > prev) {
    localStorage.setItem(key, wpm);
    hsEl.textContent = wpm;
  }
}

function reset() {
  clearInterval(timerInterval);
  text       = pickText();
  charIndex  = 0;
  started    = false;
  finished   = false;
  timeLeft   = TIME_LIMIT;
  correctChars = 0;
  wrongChars   = 0;
  totalTyped   = 0;

  inputEl.value    = '';
  inputEl.disabled = false;
  timerEl.textContent = TIME_LIMIT;
  wpmEl.textContent   = 0;
  accEl.textContent   = '—';
  ringEl.style.strokeDashoffset = 0;
  ringEl.style.stroke = '#7c6af7';

  resultEl.classList.remove('show');
  renderText();
  inputEl.focus();

  const key = 'hs_' + difficulty;
  hsEl.textContent = localStorage.getItem(key) || 0;
}

inputEl.addEventListener('input', (e) => {
  if (finished) return;

  if (!started) {
    started = true;
    startTimer();
  }

  const typed = e.data;
  if (!typed) return;

  const expected = text[charIndex];
  const spans = displayEl.querySelectorAll('.char');

  totalTyped++;
  if (typed === expected || (expected === ' ' && typed === ' ')) {
    spans[charIndex].classList.remove('pending', 'cursor');
    spans[charIndex].classList.add('correct');
    correctChars++;
  } else {
    spans[charIndex].classList.remove('pending', 'cursor');
    spans[charIndex].classList.add('wrong');
    wrongChars++;
  }

  charIndex++;
  if (charIndex < text.length) {
    spans[charIndex].classList.add('cursor');
  }

  inputEl.value = '';
  updateStats();

  if (charIndex >= text.length) {
    text = pickText();
    charIndex = 0;
    renderText();
  }
});

document.querySelectorAll('.diff-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    difficulty = btn.dataset.diff;
    reset();
  });
});

document.getElementById('reset-btn').addEventListener('click', reset);
document.getElementById('retry-btn').addEventListener('click', reset);

reset();
</script>
</body>
</html>
